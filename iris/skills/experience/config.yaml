# ── Retrieval settings ──
retrieval:
  top_k: 5                      # max experiences to inject per analysis
  company_boost: 1.0            # relevance boost for same-company matches
  sector_boost: 0.7             # relevance boost for same-sector matches
  semantic_boost: 0.5           # relevance boost for cross-domain semantic matches
  min_confidence: 0.3           # don't retrieve experiences below this confidence

# ── Update thresholds (FLEX three-way rule) ──
update:
  duplicate_threshold: 0.90     # similarity above this → discard (deduplicate)
  merge_threshold: 0.70         # similarity above this → merge entries
  # Below merge_threshold → insert as new

# ── Quality signals ──
quality:
  min_evidence_for_pattern: 3   # need 3+ supporting instances to elevate to pattern
  min_evidence_for_strategic: 5 # need 5+ instances to elevate to strategic
  decay_days: 365               # experiences not validated in this many days get flagged
  max_library_size: 500         # hard cap to prevent unbounded growth

# ── Reflection settings ──
reflection:
  stale_prediction_days: 90     # predictions older than this need review
  min_error_for_warning: 0.03   # >3pp error generates a Warning Zone entry
  min_accuracy_for_golden: 0.02 # <2pp error generates a Golden Zone entry

# ── Distillation settings ──
distillation:
  min_attributions_before_distill: 5   # need this many attribution records
  cross_company_pattern_threshold: 3   # same pattern in 3+ companies → sector level
